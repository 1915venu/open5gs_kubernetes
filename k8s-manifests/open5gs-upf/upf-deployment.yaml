---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open5gs-upf
  namespace: open5gs-upf
  labels:
    app: upf
    app.kubernetes.io/name: upf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upf
  template:
    metadata:
      labels:
        app: upf
        app.kubernetes.io/name: upf
      annotations:
        k8s.v1.cni.cncf.io/networks: open5gs-n3, open5gs-n4, open5gs-n6
    spec:
      initContainers:
      - name: tun-create
        image: docker.io/gradiant/open5gs:2.7.5
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "-c", "/k8s-entrypoint.sh"]
        securityContext:
          privileged: true
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
          capabilities:
            add: ["NET_ADMIN"]
        volumeMounts:
        - name: entrypoint
          mountPath: /k8s-entrypoint.sh
          subPath: k8s-entrypoint.sh
      containers:
      - name: open5gs-upf
        image: docker.io/gradiant/open5gs:2.7.5
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "/upf-start.sh"]
        ports:
        - name: pfcp
          containerPort: 8805
          protocol: UDP
        - name: gtpu
          containerPort: 2152
          protocol: UDP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        securityContext:
          privileged: true
          runAsNonRoot: false
          capabilities:
            add: ["NET_ADMIN"]
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        volumeMounts:
        - name: config
          mountPath: /opt/open5gs/etc/open5gs/upf.yaml
          subPath: upf.yaml
        - name: entrypoint
          mountPath: /upf-start.sh
          subPath: upf-start.sh
      volumes:
      - name: config
        configMap:
          name: open5gs-upf
      - name: entrypoint
        configMap:
          name: open5gs-upf-entrypoint
          defaultMode: 0755
      securityContext:
        fsGroup: 999
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: open5gs-upf-pfcp
  namespace: open5gs-upf
spec:
  type: NodePort
  selector:
    app: upf
  ports:
  - name: pfcp
    port: 8805
    targetPort: 8805
    protocol: UDP
    nodePort: 30805
---
apiVersion: v1
kind: Service
metadata:
  name: open5gs-upf-gtpu
  namespace: open5gs-upf
spec:
  type: NodePort
  selector:
    app: upf
  ports:
  - name: gtpu
    port: 2152
    targetPort: 2152
    protocol: UDP
    nodePort: 31085
---
apiVersion: v1
kind: Service
metadata:
  name: open5gs-upf-metrics
  namespace: open5gs-upf
spec:
  type: ClusterIP
  selector:
    app: upf
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
